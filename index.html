<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>송도 현장체험학습 4x4 스마트 빙고</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Inter & Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar {
            display: none;
        }
        .bingo-cell {
            aspect-ratio: 1 / 1;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col justify-between min-h-screen overflow-hidden">

<!-- 게임 진입 전 로그인 화면 -->
<div id="login-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950 px-6 transition-all duration-300">
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl text-center">
        <div class="mb-6">
            <span class="px-3 py-1 text-xs font-semibold bg-blue-500/10 text-blue-400 rounded-full border border-blue-500/20">Songdo Field Trip</span>
            <h1 class="text-2xl font-black mt-3 text-white leading-tight">송도 퀴즈 빙고 🧩<br><span class="text-blue-400 text-lg">인천도시역사관 · G타워 · 문자박물관</span></h1>
            <p class="text-slate-400 text-xs mt-2">체험 장소를 탐색하며 퀴즈를 풀고 빙고를 완성하세요!</p>
        </div>

        <div class="space-y-4 text-left mb-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">학번 (예: 20101)</label>
                <input type="number" id="student-id" placeholder="학번 5자리를 입력하세요" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white font-medium focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all placeholder:text-slate-500 text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">이름</label>
                <input type="text" id="student-name" placeholder="이름을 입력하세요" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white font-medium focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all placeholder:text-slate-500 text-sm">
            </div>
        </div>

        <button onclick="startGame()" class="w-full py-3.5 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 text-sm">
            빙고판 생성 및 시작하기 🚀
        </button>
        <p class="text-[10px] text-slate-500 mt-4">⚠️ 학생마다 서로 다른 랜덤 16문항이 빙고판에 배치됩니다.</p>
    </div>
</div>

<!-- 메인 게임 영역 (모바일 1화면 최적화) -->
<header id="main-header" class="px-4 pt-3 pb-2 bg-slate-900 border-b border-slate-800">
    <div class="flex justify-between items-center">
        <div>
            <div class="flex items-center space-x-2">
                <span class="text-lg font-black tracking-tight text-white">송도 퀴즈 빙고</span>
                <span id="capture-badge" class="hidden px-2 py-0.5 text-[10px] bg-emerald-500 text-slate-950 font-black rounded">인증용</span>
            </div>
            <p class="text-[10px] text-slate-400">터치하여 문제를 풀고, 녹색(성공) 빙고를 완성하세요!</p>
        </div>
        <div class="text-right">
            <span id="player-badge" class="block text-sm font-bold text-blue-400 bg-blue-950/40 px-3 py-1 rounded-lg border border-blue-900/40">
                학번 이름
            </span>
        </div>
    </div>
</header>

<!-- 메인 빙고판 바디 -->
<main class="flex-grow flex flex-col justify-center px-4 py-2 bg-slate-950 overflow-hidden">
    <div class="w-full max-w-md mx-auto flex flex-col space-y-3">
        <!-- 상단 현황판 -->
        <div class="flex justify-between items-center bg-slate-900/60 border border-slate-800/80 rounded-xl px-4 py-2.5 text-xs">
            <div class="flex items-center space-x-1.5">
                <span class="text-slate-400">현재 달성:</span>
                <span id="bingo-count" class="font-extrabold text-amber-400 text-sm">🔥 0 빙고</span>
            </div>
            <div class="flex space-x-2 text-[10px]">
                <span class="flex items-center space-x-1"><span class="w-2.5 h-2.5 bg-emerald-500 rounded-sm"></span><span class="text-slate-400">성공</span></span>
                <span class="flex items-center space-x-1"><span class="w-2.5 h-2.5 bg-rose-500 rounded-sm"></span><span class="text-slate-400">실패</span></span>
                <span class="flex items-center space-x-1"><span class="w-2.5 h-2.5 bg-slate-800 rounded-sm"></span><span class="text-slate-400">미수행</span></span>
            </div>
        </div>

        <!-- 4x4 빙고 보드 -->
        <div id="bingo-board" class="grid grid-cols-4 gap-2 w-full">
            <!-- JavaScript에서 동적으로 셀 삽입 -->
        </div>
    </div>
</main>

<!-- 하단 컨트롤 영역 -->
<footer id="main-footer" class="px-4 py-3 bg-slate-900 border-t border-slate-800 flex justify-between gap-3">
    <button onclick="toggleCaptureMode()" id="btn-capture" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white font-bold rounded-xl text-xs transition-all border border-slate-700 flex items-center justify-center space-x-1">
        <span>📸 캡처용 모드 전환</span>
    </button>
    <button onclick="confirmReset()" id="btn-reset" class="px-4 py-3 bg-slate-900 hover:bg-rose-950/20 text-slate-500 hover:text-rose-400 font-medium rounded-xl text-xs transition-all border border-slate-800">
        초기화
    </button>
</footer>

<!-- 퀴즈 해결 모달 -->
<div id="quiz-modal" class="fixed inset-0 z-50 hidden bg-slate-950/80 backdrop-blur-sm flex items-center justify-center px-4">
    <div class="w-full max-w-sm bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-2xl relative animate-in fade-in zoom-in duration-200">
        <!-- 닫기 버튼 -->
        <button onclick="closeQuizModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-all text-lg">✕</button>
        
        <!-- 위치 헤더 -->
        <div class="mb-3">
            <span id="modal-loc-badge" class="inline-block px-2.5 py-1 text-[10px] font-extrabold rounded-md"></span>
            <span id="modal-quiz-num" class="text-xs text-slate-400 ml-2 font-mono">Q-01</span>
        </div>

        <!-- 문제 내용 -->
        <div class="mb-4">
            <h3 class="text-xs font-bold text-slate-500 mb-1">질문</h3>
            <p id="modal-question" class="text-sm font-semibold text-white leading-relaxed whitespace-pre-line bg-slate-950 p-3 rounded-xl border border-slate-800 min-h-[4.5rem]">
                여기에 질문 내용이 들어갑니다.
            </p>
        </div>

        <!-- 정답 입력 -->
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">정답 입력</label>
                <input type="text" id="quiz-answer-input" placeholder="정답을 정확히 입력하세요" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white font-bold text-center text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all placeholder:text-slate-500 placeholder:font-normal">
            </div>
            
            <div id="modal-status-box" class="hidden p-2.5 rounded-xl text-center text-xs font-bold">
                <!-- 결과 상태 메시지 -->
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="closeQuizModal()" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-xl text-xs transition-all">
                    닫기
                </button>
                <button onclick="submitAnswer()" id="btn-submit" class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl text-xs transition-all shadow-md shadow-blue-500/10">
                    정답 확인하기
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 알림 피드백 박스 -->
<div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 hidden bg-blue-500 text-white font-bold text-xs px-4 py-2.5 rounded-full shadow-lg text-center min-w-[180px]">
    알림 메시지
</div>

<script>
// 100문항 퀴즈 데이터베이스
// 분류: 1=인천도시역사관, 2=G타워 홍보관, 3=국립세계문자박물관
const QUIZ_DB = [
    // 1. 인천도시역사관 (35문항)
    { id: 1, loc: 1, q: "인천이 우리나라 최초로 외국의 문물을 받아들이며 문을 연 사건은 무엇인가요?", a: ["개항"] },
    { id: 2, loc: 1, q: "1883년 개항 당시 인천의 옛 이름은 무엇이었을까요?", a: ["제물포"] },
    { id: 3, loc: 1, q: "근대도시관 입구 근처에서 볼 수 있는, 옛날 인천항에 드나들던 증기선의 이름은?", a: ["창룡호"] },
    { id: 4, loc: 1, q: "개항기 인천에 만들어진 외국인들의 거주 및 치외법권 지역을 무엇이라 부르나요?", a: ["조계", "각국조계"] },
    { id: 5, loc: 1, q: "인천에 가장 먼저 조계를 설치한 나라는 어디일까요?", a: ["일본"] },
    { id: 6, loc: 1, q: "청나라 조계지와 일본 조계지 경계에 세워진 계단이 있는 곳은 현재 어디 근처인가요?", a: ["자유공원", "인천자유공원", "인천 자유공원"] },
    { id: 7, loc: 1, q: "개항기 인천항에서 물건을 나르고 하역하던 노동자들을 부르던 말은?", a: ["부두노동자", "쿨리"] },
    { id: 8, loc: 1, q: "우리나라 최초의 철도로, 인천역과 노량진역을 잇던 이 철도의 이름은?", a: ["경인선"] },
    { id: 9, loc: 1, q: "경인선에 처음 도입되어 달렸던 증기기관차의 이름은 무엇인가요?", a: ["모가형", "모가형증기기관차", "모가"] },
    { id: 10, loc: 1, q: "인천역 앞에 세워진 화려한 중국식 전통 대문의 이름은 무엇인가요?", a: ["패루"] },
    { id: 11, loc: 1, q: "개항기 인천에 세워진 우리나라 최초의 서양식 호텔 이름은?", a: ["대불호텔"] },
    { id: 12, loc: 1, q: "전시관에 재현된 옛날 인천의 은행 중, '일본 제1은행'의 주요 업무는 무엇이었나요?", a: ["관세징수", "관세 징수", "금매입", "금 매입"] },
    { id: 13, loc: 1, q: "조선시대 인천을 방어하기 위해 해안가에 설치했던 방어 시설의 이름은?", a: ["포대", "화도진"] },
    { id: 14, loc: 1, q: "인천에서 처음 시작되어 전국으로 퍼진, 면과 춘장을 볶아 만든 음식은?", a: ["짜장면", "자장면"] },
    { id: 15, loc: 1, q: "근대기 인천항에서 밀수품을 단속하고 관세를 부과하던 기관의 이름은?", a: ["인천해관"] },
    { id: 16, loc: 1, q: "인천에서 조립·생산된 우리나라 최초의 국산 자동차(국산 부품 혼용)의 이름은?", a: ["시발자동차", "시발", "시-발"] },

    { id: 18, loc: 1, q: "70~80년대 인천 부평공장에서 생산되어 큰 인기를 끈 국민 경차의 이름은?", a: ["티코"] },
    { id: 19, loc: 1, q: "과거 인천항의 조수간만의 차를 극복하기 위해 만들어진, 문을 닫아 물을 가두는 시설은?", a: ["갑문"] },
    { id: 20, loc: 1, q: "인천의 대표적인 공업도시인 '부평'에 일제강점기 시절 세워진 대규모 무기 공장의 이름은?", a: ["조병창", "일본육군조병창", "일본 육군 조병창"] },
    { id: 21, loc: 1, q: "일제강점기 부평 조병창에 강제 동원된 노동자들이 살던 줄지어 늘어선 집들을 무엇이라 부르나요?", a: ["미쓰비시 줄사택", "줄사택", "미쓰비시줄사택"] },
    { id: 22, loc: 1, q: "과거 수인선 철도를 달리던, 일반 기차보다 폭이 좁은 미니 기차를 무엇이라 하나요?", a: ["협궤열차", "협궤"] },
    { id: 23, loc: 1, q: "협궤열차가 주로 실어나르던 인천의 대표적인 특산물은 무엇이었을까요?", a: ["소금"] },
    { id: 24, loc: 1, q: "인천 전역에 있던 소금을 만들던 넓은 땅을 무엇이라 부르나요?", a: ["염전"] },
    { id: 25, loc: 1, q: "전시관 벽면에 있는 옛 인천의 중심지 지도에서, 현재의 관교동·문학동 부근에 있던 조선시대 행정기관은?", a: ["인천도호부관아", "인천도호부청사", "도호부관아", "도호부청사"] },
    { id: 26, loc: 1, q: "인천 경제자유구역(IFEZ)을 구성하는 세 가지 도시의 이름은?", a: ["송도, 영종, 청라", "송도 영종 청라", "송도,영종,청라"] },
    { id: 27, loc: 1, q: "도시모형관 바닥에 펼쳐진 거대한 디오라마 모형은 실제 인천을 몇 분의 1로 축소한 것인가요?", a: ["1:1500", "1500", "1500분의 1"] },
    { id: 28, loc: 1, q: "모형관에서 찾을 수 있는, 영종도와 송도국제도시를 연결하는 우리나라에서 가장 긴 다리는?", a: ["인천대교"] },
    { id: 29, loc: 1, q: "인천대교의 총 길이는 약 몇 km 일까요?", a: ["21.38", "21.38km", "21"] },
    { id: 30, loc: 1, q: "송도 센트럴파크 한가운데를 흐르는 물길은 민물일까요, 바닷물일까요?", a: ["바닷물", "해수"] },
    { id: 31, loc: 1, q: "송도국제도시는 원래 바다였던 곳을 메워서 만들었습니다. 이 공법을 무엇이라 하나요?", a: ["매립"] },
    { id: 32, loc: 1, q: "모형관에서 가장 높게 솟아 있는, 송도의 랜드마크 빌딩(지하 3층, 지상 68층)의 이름은 무엇일까요?", a: ["포스코타워-송도", "포스코타워송도", "포스코타워", "동북아무역타워"] },

    { id: 38, loc: 2, q: "홍보관 안내판에서 소개하는 IFEZ의 풀 네임(영어 영문명)은 무엇인가요?", a: ["Incheon Free Economic Zone", "incheon free economic zone"] },
    { id: 39, loc: 2, q: "IFEZ(인천경제자유구역)가 지정된 최초의 연도는 몇 년도일까요?", a: ["2003", "2003년"] },
    { id: 40, loc: 2, q: "송도국제도시가 추구하는 핵심 비전 중 하나로, 첨단 정보통신기술(ICT)이 집약된 도시를 뜻하는 말은?", a: ["스마트시티", "스마트 시티", "Smart City"] },

// 무작위 셔플 헬퍼
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

    // 150명 각기 다른 난수를 보장하기 위해 셔플 후 필요한 개수 추출
    const selectedLoc1 = shuffle([...loc1Pool]).slice(0, 5); // 5개
    const selectedLoc2 = shuffle([...loc2Pool]).slice(0, 5); // 5개
    const selectedLoc3 = shuffle([...loc3Pool]).slice(0, 6); // 6개

    // 합쳐서 16개로 만든 뒤 다시 무작위로 뒤섞기
    const final16 = shuffle([...selectedLoc1, ...selectedLoc2, ...selectedLoc3]);
    return final16;
}

// 게임 시작 처리
function startGame() {
    const sId = document.getElementById('student-id').value.trim();
    const sName = document.getElementById('student-name').value.trim();

    if (sId.length < 3 || sName.length < 2) {
        showToast("학번(3자리 이상)과 이름을 정확히 입력하세요!");
        return;
    }

    state.studentId = sId;
    state.studentName = sName;
    state.board = generateBingoPool();
    
    // 초기 상태값 할당
    for (let i = 0; i < 16; i++) {
        state.status[i] = 'unsolved';
        state.answers[i] = '';
    }

    // 로그인 화면 숨기기
    document.getElementById('login-screen').classList.add('translate-y-full');
    setTimeout(() => {
        document.getElementById('login-screen').classList.add('hidden');
    }, 300);

    // 헤더 학생 정보 업데이트
    document.getElementById('player-badge').innerText = `${sId} ${sName}`;

    renderBoard();
    updateBingoCount();
    showToast(`반갑습니다, ${sName} 학생! 빙고 시작!`);
}

// 장소 세부 정보 포맷터
function getLocMeta(locId) {
    switch (locId) {
        case 1: return { name: "도시역사관", bg: "bg-blue-500/10", border: "border-blue-500/30", text: "text-blue-400", badge: "bg-blue-500 text-slate-950" };
        case 2: return { name: "G타워", bg: "bg-emerald-500/10", border: "border-emerald-500/30", text: "text-emerald-400", badge: "bg-emerald-500 text-slate-950" };
        case 3: return { name: "문자박물관", bg: "bg-purple-500/10", border: "border-purple-500/30", text: "text-purple-400", badge: "bg-purple-500 text-slate-950" };
    }
}

// 빙고판 렌더링
function renderBoard() {
    const boardEl = document.getElementById('bingo-board');
    boardEl.innerHTML = '';

    state.board.forEach((quiz, idx) => {
        const meta = getLocMeta(quiz.loc);
        const cellStatus = state.status[idx];
        const studentAns = state.answers[idx];

        let statusClass = "bg-slate-900/80 hover:bg-slate-800/80 border-slate-800 text-slate-400";
        if (cellStatus === 'success') {
            statusClass = "bg-emerald-950/60 border-emerald-500/70 text-emerald-200";
        } else if (cellStatus === 'failure') {
            statusClass = "bg-rose-950/60 border-rose-500/70 text-rose-200";
        }

        // 셀 엘리먼트 동적 배치 (모바일 스크린 비율 최적화 구조)
        const cell = document.createElement('button');
        cell.className = `bingo-cell flex flex-col justify-between p-1.5 border rounded-xl text-center transition-all active:scale-95 overflow-hidden ${statusClass}`;
        cell.onclick = () => openQuiz(idx);

        // 상단 장소 라벨
        const locLabel = document.createElement('span');
        locLabel.className = `text-[8px] font-black px-1.5 py-0.5 rounded-md ${meta.badge}`;
        locLabel.innerText = meta.name;
        if (cellStatus !== 'unsolved') {
            locLabel.className = `text-[8px] font-semibold px-1 py-0.2 bg-slate-800 text-slate-400 rounded-sm`;
        }

        // 중단 아이콘 또는 질문 식별자
        const centerText = document.createElement('div');
        centerText.className = "text-xs font-bold my-auto tracking-tight";
        if (cellStatus === 'success') {
            centerText.innerText = "✅ 성공";
            centerText.className = "text-xs font-black text-emerald-400 animate-bounce";
        } else if (cellStatus === 'failure') {
            centerText.innerText = "❌ 실패";
            centerText.className = "text-xs font-black text-rose-400";
        } else {
            centerText.innerText = `Q-${quiz.id}`;
            centerText.className = `text-xs font-bold text-slate-300`;
        }

        // 하단 입력된 정답 (있을 때만 표시)
        const answerLabel = document.createElement('div');
        answerLabel.className = "text-[9px] truncate w-full text-slate-300 font-medium px-0.5 py-0.5 bg-slate-950/40 rounded border border-slate-800/50 mt-1 min-h-[1.2rem] flex items-center justify-center";
        if (cellStatus !== 'unsolved' && studentAns) {
            answerLabel.innerText = studentAns;
            if (cellStatus === 'success') {
                answerLabel.className = "text-[9px] truncate w-full text-emerald-300 font-bold px-0.5 py-0.5 bg-emerald-900/40 rounded border border-emerald-800/40 mt-1 min-h-[1.2rem] flex items-center justify-center";
            } else {
                answerLabel.className = "text-[9px] truncate w-full text-rose-300 font-bold px-0.5 py-0.5 bg-rose-900/40 rounded border border-rose-800/40 mt-1 min-h-[1.2rem] flex items-center justify-center";
            }
        } else {
            answerLabel.innerText = "탭하여 풀기";
            answerLabel.className = "text-[8px] text-slate-500 mt-1 font-normal";
        }

        cell.appendChild(locLabel);
        cell.appendChild(centerText);
        cell.appendChild(answerLabel);
        boardEl.appendChild(cell);
    });
}

// 퀴즈 팝업창 활성화
function openQuiz(idx) {
    if (state.isCaptureMode) return; // 캡처 모드일 때는 클릭 무시

    state.activeIdx = idx;
    const quiz = state.board[idx];
    const meta = getLocMeta(quiz.loc);
    
    document.getElementById('modal-loc-badge').innerText = meta.name;
    document.getElementById('modal-loc-badge').className = `inline-block px-2.5 py-1 text-[10px] font-extrabold rounded-md ${meta.badge}`;
    document.getElementById('modal-quiz-num').innerText = `문항 고유번호: Q-${quiz.id}`;
    document.getElementById('modal-question').innerText = quiz.q;
    
    // 이전에 입력했던 값 불러오기
    const prevAnswer = state.answers[idx] || '';
    document.getElementById('quiz-answer-input').value = prevAnswer;

    // 상태 박스 세팅
    const statusBox = document.getElementById('modal-status-box');
    const submitBtn = document.getElementById('btn-submit');
    
    if (state.status[idx] === 'success') {
        statusBox.className = "p-2.5 rounded-xl text-center text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
        statusBox.innerText = `🎉 이미 정답을 맞춘 퀴즈입니다! (입력 답안: ${prevAnswer})`;
        statusBox.classList.remove('hidden');
        submitBtn.disabled = true;
        submitBtn.className = "flex-1 py-3 bg-slate-800 text-slate-500 font-bold rounded-xl text-xs cursor-not-allowed";
    } else if (state.status[idx] === 'failure') {
        statusBox.className = "p-2.5 rounded-xl text-center text-xs font-bold bg-rose-500/10 text-rose-400 border border-rose-500/20";
        statusBox.innerText = `⚠️ 오답이 제출된 상태입니다. 다시 풀 수 있습니다!`;
        statusBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.className = "flex-1 py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl text-xs transition-all";
    } else {
        statusBox.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.className = "flex-1 py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl text-xs transition-all";
    }

    document.getElementById('quiz-modal').classList.remove('hidden');
    setTimeout(() => {
        document.getElementById('quiz-answer-input').focus();
    }, 100);
}

function closeQuizModal() {
    document.getElementById('quiz-modal').classList.add('hidden');
    state.activeIdx = null;
}

// 답안 평가 및 제출 로직
function submitAnswer() {
    const idx = state.activeIdx;
    if (idx === null) return;

    const inputVal = document.getElementById('quiz-answer-input').value.trim();
    if (!inputVal) {
        showToast("답안을 입력해주세요!");
        return;
    }

    const quiz = state.board[idx];
    
    // 스마트 정답 체크 (공백 제거, 대소문자 무시, 슬래시 분할 매칭)
    const normalizedInput = inputVal.replace(/\s+/g, '').toLowerCase();
    
    let isCorrect = false;
    
    for (let rawAnswer of quiz.a) {
        // 복합 정답인 경우 분할하여 개별 비교 지원
        const parts = rawAnswer.split('/').map(p => p.trim());
        for (let part of parts) {
            const normalizedTarget = part.replace(/\s+/g, '').toLowerCase();
            if (normalizedInput === normalizedTarget || normalizedInput.includes(normalizedTarget) && normalizedTarget.length >= 2) {
                isCorrect = true;
                break;
            }
        }
        if (isCorrect) break;
    }

    // 상태 저장
    state.answers[idx] = inputVal;
    state.status[idx] = isCorrect ? 'success' : 'failure';

    renderBoard();
    updateBingoCount();
    closeQuizModal();

    if (isCorrect) {
        showToast("🎯 정답입니다! 한 칸 성공!");
    } else {
        showToast("❌ 정답이 아닙니다. 다시 관찰해보세요!");
    }
}

// 4x4 빙고 라인 체크 알고리즘
function updateBingoCount() {
    let bingos = 0;
    const grid = [];
    
    // 4x4 그리드 매핑
    for (let i = 0; i < 4; i++) {
        grid.push([
            state.status[i*4] === 'success',
            state.status[i*4 + 1] === 'success',
            state.status[i*4 + 2] === 'success',
            state.status[i*4 + 3] === 'success'
        ]);
    }

    // 가로 4줄 검사
    for (let r = 0; r < 4; r++) {
        if (grid[r][0] && grid[r][1] && grid[r][2] && grid[r][3]) bingos++;
    }

    // 세로 4줄 검사
    for (let c = 0; c < 4; c++) {
        if (grid[0][c] && grid[1][c] && grid[2][c] && grid[3][c]) bingos++;
    }

    // 대각선 2줄 검사
    if (grid[0][0] && grid[1][1] && grid[2][2] && grid[3][3]) bingos++;
    if (grid[0][3] && grid[1][2] && grid[2][1] && grid[3][0]) bingos++;

    const countEl = document.getElementById('bingo-count');
    countEl.innerText = `🔥 ${bingos} 빙고`;

    if (bingos > 0) {
        countEl.className = "font-extrabold text-emerald-400 text-sm animate-bounce";
    } else {
        countEl.className = "font-extrabold text-amber-400 text-sm";
    }
}

// 캡처 최적화 전용 모드 토글
function toggleCaptureMode() {
    state.isCaptureMode = !state.isCaptureMode;
    
    const body = document.body;
    const footer = document.getElementById('main-footer');
    const header = document.getElementById('main-header');
    const badge = document.getElementById('capture-badge');
    const btnCapture = document.getElementById('btn-capture');

    if (state.isCaptureMode) {
        // 캡처 전용 간소화 뷰
        body.classList.replace('bg-slate-900', 'bg-slate-950');
        footer.classList.add('hidden');
        badge.classList.remove('hidden');
        btnCapture.innerText = "↩️ 일반 모드로 복귀하기";
        
        // 캡처를 쉽게 하기 위해 하단에 임시 복귀 바를 띄웁니다.
        const returnBtn = document.createElement('button');
        returnBtn.id = 'temp-return-bar';
        returnBtn.className = "w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black text-xs text-center transition-all";
        returnBtn.innerText = "📸 캡처 완료 후 여기를 탭하면 원래 화면으로 돌아갑니다.";
        returnBtn.onclick = toggleCaptureMode;
        body.appendChild(returnBtn);

        showToast("화면이 깔끔하게 정리되었습니다. 캡처해 주세요!");
    } else {
        // 기존 뷰 복원
        body.classList.replace('bg-slate-950', 'bg-slate-900');
        footer.classList.remove('hidden');
        badge.classList.add('hidden');
        
        const returnBar = document.getElementById('temp-return-bar');
        if (returnBar) returnBar.remove();

        showToast("일반 모드로 돌아왔습니다.");
    }
}

// 초기화 확인
function confirmReset() {
    const ok = confirm("정말로 빙고를 초기화하시겠습니까?\n작성한 학번, 이름과 문제 진행 기록이 모두 지워집니다.");
    if (ok) {
        localStorage.clear();
        location.reload();
    }
}

// 모바일 토스트 피드백 알림
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.innerText = message;
    toast.classList.remove('hidden');
    
    // 이전 타이머 지우기
    if (window.toastTimeout) clearTimeout(window.toastTimeout);
    
    window.toastTimeout = setTimeout(() => {
        toast.classList.add('hidden');
    }, 2500);
}

// 엔터키 제출 연동
document.getElementById('quiz-answer-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        submitAnswer();
    }
});
</script>
